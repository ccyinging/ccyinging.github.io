">int</span> n;</span><br><span class="line"><span class="comment">//堆 </span></span><br><span class="line"><span class="keyword">int</span> heap[<span class="number">10</span>];</span><br><span class="line"></span><br><span class="line"><span class="comment">//交换函数 </span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">swap</span><span class="params">(<span class="keyword">int</span> x, <span class="keyword">int</span> y)</span></span>; </span><br><span class="line"><span class="comment">//建最大堆函数</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">create</span><span class="params">()</span></span>;</span><br><span class="line"><span class="comment">//向下调整堆函数</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">siftdown</span><span class="params">(<span class="keyword">int</span> index)</span></span>;</span><br><span class="line"><span class="comment">//升序函数</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">sort</span><span class="params">()</span></span>; </span><br><span class="line"> </span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="comment">//输入10个数，存储在heap中，对数据排序</span></span><br><span class="line">    <span class="keyword">int</span> num = <span class="number">10</span>;</span><br><span class="line">    n = num; </span><br><span class="line">    </span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; num; i++)  </span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">scanf</span>(<span class="string">&quot;%d&quot;</span>, &amp;heap[i]);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    create();</span><br><span class="line">    sort();</span><br><span class="line">    </span><br><span class="line">    <span class="comment">//测试</span></span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; num; i++)  </span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">&quot;%d &quot;</span>, heap[i]);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">swap</span><span class="params">(<span class="keyword">int</span> x, <span class="keyword">int</span> y)</span> </span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> temp = heap[x];</span><br><span class="line">    heap[x] = heap[y];</span><br><span class="line">    heap[y] = temp;</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">create</span><span class="params">()</span> </span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="comment">//线性数组表示完全二叉树时,数组下标从0开始</span></span><br><span class="line">    <span class="comment">//若有n个结点，下标分别为0-(n-1)</span></span><br><span class="line">    <span class="comment">//则其有非叶子结点n/2个，叶子结点(n + 1)/2 </span></span><br><span class="line">    <span class="comment">//x.left=2*x+1, x.right= 2*x+2</span></span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = n / <span class="number">2</span> - <span class="number">1</span>; i &gt;= <span class="number">0</span>; i--)</span><br><span class="line">    &#123;</span><br><span class="line">        siftdown(i);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">siftdown</span><span class="params">(<span class="keyword">int</span> index)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> maxI; </span><br><span class="line">    </span><br><span class="line">    <span class="comment">//当index有左孩子，并且需要调整</span></span><br><span class="line">    <span class="keyword">while</span> (<span class="number">2</span> * index + <span class="number">1</span> &lt;= n - <span class="number">1</span>)</span><br><span class="line">    &#123; </span><br><span class="line">        <span class="keyword">if</span> (heap[index] &lt; heap[<span class="number">2</span> * index + <span class="number">1</span>])</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="comment">//左孩子值比index结点值大 </span></span><br><span class="line">            maxI = <span class="number">2</span> * index + <span class="number">1</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span> </span><br><span class="line">        &#123;</span><br><span class="line">            maxI = index;</span><br><span class="line">        &#125;</span><br><span class="line">        </span><br><span class="line">        <span class="comment">//当index有右孩子</span></span><br><span class="line">        <span class="keyword">if</span> (<span class="number">2</span> * index + <span class="number">2</span> &lt;= n - <span class="number">1</span>)</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="comment">//如果右孩子值更大</span></span><br><span class="line">            <span class="keyword">if</span> (heap[maxI] &lt; heap[<span class="number">2</span> * index + <span class="number">2</span>])</span><br><span class="line">            &#123;</span><br><span class="line">                maxI = <span class="number">2</span> * index + <span class="number">2</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        </span><br><span class="line">        <span class="keyword">if</span> (index != maxI)</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="comment">//如果存在孩子值比index值大</span></span><br><span class="line">            swap(index, maxI);</span><br><span class="line">            index = maxI;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span></span><br><span class="line">        &#123;</span><br><span class="line">            <span class="comment">//不需要继续向下调整 </span></span><br><span class="line">            <span class="keyword">return</span>;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span>; </span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">sort</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">while</span> (n &gt; <span class="number">1</span>)</span><br><span class="line">    &#123; </span><br><span class="line">        swap(<span class="number">0</span>, n - <span class="number">1</span>);</span><br><span class="line">        n--;</span><br><span class="line">        siftdown(<span class="number">0</span>);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
